events { worker_connections 1024; }

http {
    upstream securiteai_cluster {
        # Thursday Task: Distribute traffic across the container fleet
        server securiteai-app:8000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://securiteai_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Telemetry Aggregation
        location /metrics {
            proxy_pass http://securiteai_cluster/metrics;
        }
    }
}