# =================================================================
# SecuriteAI: Distributed Infrastructure Orchestration
# Description: Manages the lifecycle of the inference fleet, stateful 
# buffer, and auditor dashboard.
# =================================================================
services:
  # MEMORY: Distributed state for sliding windows
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  # BRAIN: High-throughput LSTM-Autoencoder API
  api:
    build:
      context: .. # Accesses the project root for source code
      dockerfile: deployments/Dockerfile.app
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    volumes:
      # Mounts host-side artifacts into the container for persistence
      # and 'Live Reload' support.
      - ../artifacts:/app/artifacts
      - ../visualizations:/app/visualizations

  # EYES: Real-time telemetry and GRC Log Explorer
  dashboard:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.dashboard
    ports:
      - "8501:8501"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - api
    volumes:
      - ../artifacts:/app/artifacts

  # GOVERNANCE: Standalone worker for Champion-Challenger logic
  trigger:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.app
    environment:
      - REDIS_HOST=redis
    depends_on:
      - api
    # Overrides the default API command to run the evolution script
    command: ["python", "retrain_trigger.py"]