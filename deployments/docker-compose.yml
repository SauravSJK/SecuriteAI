services:
  # The Load Balancer (The Traffic Controller)
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - securiteai-app

  # The Inference Engine (The Scaling Replicas)
  securiteai-app:
    build: .
    volumes:
      - ./models:/app/models
    deploy:
      replicas: 3  #Horizontal Scaling
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3