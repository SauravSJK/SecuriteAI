services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.app
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    volumes:
      - ../artifacts:/app/artifacts
      - ../visualizations:/app/visualizations

  dashboard:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.dashboard
    ports:
      - "8501:8501"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - api
    volumes:
      - ../artifacts:/app/artifacts

  # Optional: Retrain trigger as a standalone worker
  trigger:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.app
    environment:
      - REDIS_HOST=redis
    depends_on:
      - api
    command: ["python", "retrain_trigger.py"]