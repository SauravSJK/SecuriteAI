services:
  # The Shared Brain (Distributed State)
  redis:
    image: redis:latest
    # Default port 6379 is exposed internally to the docker network

  # The Load Balancer (The Traffic Controller)
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - securiteai-app

  # The Inference Engine (The Scaling Replicas)
  securiteai-app:
    build: 
      context: ..
      dockerfile: deployments/Dockerfile
    environment:
      - REDIS_HOST=redis
    volumes:
      - ../artifacts:/app/artifacts
    deploy:
      replicas: 3
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3