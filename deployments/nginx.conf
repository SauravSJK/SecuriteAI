# =================================================================
# SecuriteAI: Ingress Gateway & Load Balancer
# Description: Distributes log ingestion traffic and aggregates 
# metrics from the inference cluster.
# =================================================================
events { worker_connections 1024; }

http {
    # 1. CLUSTER DEFINITION: Load-balanced target group
    # Scales horizontally as you add more 'api' containers.
    upstream securiteai_cluster {
        server securiteai-app:8000;
    }

    server {
        listen 80;

        # 2. INGESTION ROUTING: Main FastAPI interface
        location / {
            proxy_pass http://securiteai_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. TELEMETRY AGGREGATION: Unified metrics scrape
        # Allows Prometheus to pull from the entire cluster via a single endpoint.
        location /metrics {
            proxy_pass http://securiteai_cluster/metrics;
        }
    }
}